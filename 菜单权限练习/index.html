<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body></body>
</html>
<script>
  //常量路由:全部用户都能访问到的路由
  let constRoute = [
    {
      path: '/login',
      component: () => import('@/views/login/index.vue'),
      name: 'login',
      meta: {
        title: '登录',
        hidden: true, //代表路由标题在菜单中是否隐藏
        icon: 'promotion',
      },
    },
    {
      path: '/',
      component: () => import('@/layout/index.vue'),
      name: 'layout',
      meta: {
        title: '',
        hidden: false, //代表路由标题在菜单中是否隐藏
        icon: '',
      },
      redirect: '/home',
      children: [
        {
          path: '/home',
          component: () => import('@/views/home/index.vue'),
          meta: {
            title: '首页',
            hidden: false, //代表路由标题在菜单中是否隐藏
            icon: 'HomeFilled',
          },
        },
      ],
    },
    {
      path: '/404',
      component: () => import('@/views/404/index.vue'),
      name: '404',
      meta: {
        title: '404',
        hidden: true, //代表路由标题在菜单中是否隐藏
        icon: 'ChatRound',
      },
    },
    {
      path: '/screen',
      component: () => import('@/views/screen/index.vue'),
      name: 'Screen',
      meta: {
        hidden: false,
        title: '数据大屏',
        icon: 'Platform',
      },
    },
  ]
  //异步路由:动态追加异步路由
  let asyncRoute = [
    {
      path: '/acl',
      component: () => import('@/layout/index.vue'),
      name: 'Acl',
      meta: {
        hidden: false,
        title: '权限管理',
        icon: 'Lock',
      },
      redirect: '/acl/user',
      children: [
        {
          path: '/acl/user',
          component: () => import('@/views/acl/user/index.vue'),
          name: 'User',
          meta: {
            hidden: false,
            title: '用户管理',
            icon: 'User',
          },
        },
        {
          path: '/acl/role',
          component: () => import('@/views/acl/role/index.vue'),
          name: 'Role',
          meta: {
            hidden: false,
            title: '角色管理',
            icon: 'UserFilled',
          },
        },
        {
          path: '/acl/permission',
          component: () => import('@/views/acl/permission/index.vue'),
          name: 'Permission',
          meta: {
            hidden: false,
            title: '菜单管理',
            icon: 'List',
          },
        },
      ],
    },
    {
      path: '/product',
      component: () => import('@/layout/index.vue'),
      name: 'Product',
      meta: {
        hidden: false,
        title: '商品管理',
        icon: 'Goods',
      },
      redirect: '/product/trademark',
      children: [
        {
          path: '/product/trademark',
          component: () => import('@/views/product/trademark/index.vue'),
          name: 'Trademark',
          meta: {
            hidden: false,
            title: '品牌管理',
            icon: 'ShoppingCartFull',
          },
        },
        {
          path: '/product/attr',
          component: () => import('@/views/product/attr/index.vue'),
          name: 'Attr',
          meta: {
            hidden: false,
            title: '属性管理',
            icon: 'ChromeFilled',
          },
        },
        {
          path: '/product/spu',
          component: () => import('@/views/product/spu/index.vue'),
          name: 'Spu',
          meta: {
            hidden: false,
            title: 'SPU管理',
            icon: 'Calendar',
          },
        },
        {
          path: '/product/sku',
          component: () => import('@/views/product/sku/index.vue'),
          name: 'Sku',
          meta: {
            hidden: false,
            title: 'SKU管理',
            icon: 'Orange',
          },
        },
      ],
    },
  ]
  //任意路由
  let anyRoute = [
    {
      //兜底路由，用来处理用户访问不存在的页面
      path: '/:pathMatch(.*)*',
      redirect: '/404',
      name: 'Any',
      meta: {
        title: '任意路由',
        hidden: true, //代表路由标题在菜单中是否隐藏
        icon: 'View',
      },
    },
  ]
  //张三123：["Product", "Spu", "Sku"]
  let 张三123 = ['Product', 'Spu', 'Sku']
  function filterAsyncRoute(asyncRoute, routes) {
    return asyncRoute.filter((item) => {
      if (routes.includes(item.name)) {
        if (item.children) {
          // item.children = filterAsyncRoute(item.children, routes) // 不要直接修改原对象
          item.children = filterAsyncRoute(JSON.parse(JSON.stringify(item.children)), routes) // 使用副本去替代
        }
        return true
      }
    })
  }
  let 张三123Result = filterAsyncRoute(asyncRoute, 张三123)
  //console.log(张三123Result)
  console.log([...constRoute, ...张三123Result, ...anyRoute], '张三123')
  //对第二个用户异步路由有影响，全部异步路由变成2个了
  console.log(asyncRoute)
</script>
