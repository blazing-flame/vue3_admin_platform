<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
      }
      .container {
        width: 100vw;
        height: 100vh;
        background: url(./bg.png) no-repeat;
        background-size: cover;
      }
      .box {
        position: fixed;
        width: 1920px;
        height: 1080px;
        background: red;
        transform-origin: left top;
        transform: scale(1.2);
        left: 50%;
        top: 50%;
      }
      .top {
        width: 100px;
        height: 100px;
        background: hotpink;
        margin-left: 50px;
      }
      .bottom {
        width: 100px;
        height: 100px;
        background: skyblue;
        margin-left: 50px;
        margin-top: 100px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 数据展示区域 -->
      <div class="box">
        <div class="top">我是祖国的</div>
        <div class="bottom">老花骨朵</div>
      </div>
    </div>
  </body>
</html>

<script>
  //控制数据大屏放大与缩小
  let box = document.querySelector('.box')
  box.style.transform = `scale(${getScale()}) translate(-50%,-50%)`
  //计算缩放比例
  function getScale(w = 1920, h = 1080) {
    const ww = window.innerWidth / w
    const wh = window.innerHeight / h
    return ww < wh ? ww : wh
  }
  //监听窗口大小变化事件，每次拖动窗口改变大小时重新计算缩放比例，实现自适应
  window.onresize = () => {
    box.style.transform = `scale(${getScale()}) translate(-50%,-50%)`
  }
</script>
